apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: beatzy
  labels:
    app: ml-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
        - name: ml-service
          image: beatzy/ml-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: PORT
              value: "8000"  # Explicitly override ConfigMap
          envFrom:
            - secretRef:
                name: beatzy-secrets
            - configMapRef:
                name: beatzy-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90  # Increased from 10 to allow model loading
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120  # Increased from default
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: models
              mountPath: /app/models
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ml-models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: beatzy
spec:
  selector:
    app: ml-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-models-pvc
  namespace: beatzy
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
