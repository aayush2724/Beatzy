# Kustomization for Beatzy Kubernetes Deployment
# ───────────────────────────────────────────────
# Usage:
#   kubectl apply -k k8s/
#
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: beatzy

resources:
  - namespace.yaml
  - configmap.yaml
  - configmap-backend.yaml
  - database.yaml
  - backend.yaml
  - frontend.yaml
  - ml-service.yaml
  - ingress.yaml

commonLabels:
  app.kubernetes.io/part-of: beatzy
  app.kubernetes.io/managed-by: kustomize

images:
  - name: beatzy/backend
    newTag: latest
  - name: beatzy/frontend
    newTag: latest
  - name: beatzy/ml-service
    newTag: latest
