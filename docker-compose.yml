version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: beatzy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: beatzy
      POSTGRES_USER: beatzy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beatzy_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beatzy"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: beatzy-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beatzy-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://beatzy:${POSTGRES_PASSWORD:-beatzy_secret}@postgres:5432/beatzy
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-refresh_secret_change_in_production}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-beatzy-audio}
      ACRCLOUD_HOST: ${ACRCLOUD_HOST}
      ACRCLOUD_ACCESS_KEY: ${ACRCLOUD_ACCESS_KEY}
      ACRCLOUD_SECRET_KEY: ${ACRCLOUD_SECRET_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      ML_SERVICE_URL: http://ml-service:8000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: beatzy-ml
    restart: unless-stopped
    environment:
      PORT: 8000
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-beatzy-audio}
      ACRCLOUD_HOST: ${ACRCLOUD_HOST}
      ACRCLOUD_ACCESS_KEY: ${ACRCLOUD_ACCESS_KEY}
      ACRCLOUD_SECRET_KEY: ${ACRCLOUD_SECRET_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./ml-service/app:/app/app:z
      - ml_models:/app/models

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: beatzy-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src:z

volumes:
  postgres_data:
  redis_data:
  ml_models:
